<body id="body" style="vertical-align: baseline;">
  <script>
    setInterval(function () {
      var div = document.querySelector("#counter");
      if (div !== null) {
        var count = div.textContent * 1 - 1;
        div.textContent = count;
        if (count <= 0) {
          window.location.replace("./CountDown.html");
        }
      }
    }, 1000);

    function LogIn() {
      var password = document.getElementById('psw');
      var psw_value = password.value.toUpperCase(); /* normalize to uppercase */
      var loggedin = false;
      console.log(`Security impact level (CIA objectives) = ${password}; Value = ${psw_value}`);

      if (psw_value == "HHH") {
        loggedin = true;
        window.location = "./Module-10.html";
      }

      if (!loggedin) {
        alert("Incorrect CIA security objectives. Please try again.");
      }
    }
  </script>

  <span style="width:100%; text-align:center; max-width:100vw;">
    <h1 style="color:white; font-size:2.5vw; line-height: 0px; font-family: sans-serif;">
        TASK: Review CIA Security Objectives
    </h1>
    <img src="../images/CIA-review.png" alt="module-05" style="height:80vh">
  </span>

  <span style="display: block; width:100%; text-align: center; max-width:100vw; margin-top: 1vh;">
    <form style="font-size: 1.5vw; color: rgb(255, 119, 0);">
      <label for="psw">Enter here the security objectives documented in the SSP, in the format SSS, then click the
        'Submit' button. </label>
      <input type="text" id="psw" name="psw" required style="font-size: 1.0vw">
      <input type="button" value=" Submit " onClick="LogIn()" style="font-size: 1.0vw">
      <br />
    </form>
  </span>

  <br /><br /><br />
