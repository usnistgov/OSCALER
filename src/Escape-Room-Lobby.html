    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: black;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      
      /* ── Sticky top bar ── */
      #topbar {
        flex-shrink: 0;
          width: 100%;
        background-color: black;
        text-align: center;
        padding: 4px 0;
        z-index: 100;
      }
      
      #topbar a {
        color: rgb(248, 90, 46);
        font-size: clamp(11px, 1.4vw, 16px);
        text-decoration: none;
        letter-spacing: 0.04em;
      }

      #topbar a:hover { text-decoration: underline; }

      /* ── 4×4 grid fills remaining height ── */
      #grid {
        flex: 1 1 auto;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 3px;
        padding: 3px;
        overflow: hidden;
      }

      /* ── Each cell ── */
      .cell {
        position: relative;
        overflow: hidden;
        background: #111;
      }

      /* iframe fills the cell at native resolution then scales down */
      .cell iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 1777px;
        height: 1000px;
        transform-origin: 0 0;
        border: none;
        pointer-events: none;  /* glass overlay handles clicks */
      }

      /* transparent clickable overlay */
      .cell a.glass {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: block;
      }
		</style>
</head>

    <script>
      function scaleIframes() {
        document.querySelectorAll('.cell').forEach(function(cell) {
          var iframe = cell.querySelector('iframe');
          if (!iframe) return;
          var scaleX = cell.offsetWidth  / 1777;
          var scaleY = cell.offsetHeight / 1000;
          var scale  = Math.min(scaleX, scaleY);
          iframe.style.transform = 'scale(' + scale + ')';
        });
      }

      scaleIframes();
      window.addEventListener('resize', scaleIframes);

      /* countdown redirect */
              setInterval(function() {
        var div = document.querySelector('#counter');
        if (div !== null) {
                    var count = div.textContent * 1 - 1;
                    div.textContent = count;                 
          if (count <= 0) window.location.replace('./CountDown.html');
                  }
              }, 1000);
      </script>
