<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <title>OSCAL Virtual Escape Room Module #03</title>
        <meta charset="UTF-8"></meta>
        <meta name="viewport" content="width=device-width, initial-scale=1, height=device-height"></meta>
        <link rel="stylesheet" href="../css/OSCALER-room.css">
        <script async type="text/javascript" id="_fed_an_ua_tag"
            src="https://dap.digitalgov.gov/Universal-Federated-Analytics-Min.js?agency=NIST&subagency=github&pua=UA-66610693-1&yt=true&exts=ppsx,pps,f90,sch,rtf,wrl,txz,m1v,xlsm,msi,xsd,f,tif,eps,mpg,xml,pl,xlt,c">
        </script>

        <script>
            function LogIn() {
                var answer = document.getElementById('risk-mitigation').value.trim().toLowerCase();

                if (answer === "ac-6.1_obj") {
                    window.location.href = "./Module-06.01.html";
                } else {
                    alert("Incorrect answer. Please try again.");
                }
            }
        </script>

        <style>
            .input-row {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
                margin: 1.5vh auto;
                font-family: sans-serif;
                font-size: 1.4vw;
                color: rgb(237, 187, 95);
                width: 100%;
            }
            .input-row input[type="text"] {
                font-size: 1.2vw;
                padding: 4px 10px;
                border: 2px solid rgb(237, 187, 95);
                border-radius: 4px;
                background: black;
                color: white;
                width: 20vw;
            }
            .submit-btn {
                font-size: 1.2vw;
                padding: 5px 20px;
                background: black;
                color: rgb(237, 187, 95);
                border: 2px solid rgb(237, 187, 95);
                border-radius: 4px;
                cursor: pointer;
            }
            .submit-btn:hover {
                background: rgb(237, 187, 95);
                color: black;
            }
        </style>
    </head>
    <body id="body" style="vertical-align: baseline;">

        <script>
            setInterval(function() {
                var div = document.querySelector("#counter");
                if (div !== null) {
                    var count = div.textContent * 1 - 1;
                    div.textContent = count;
                    if (count <= 0) {
                        window.location.replace("./CountDown.html");
                    }
                }
            }, 1000);
        </script>

        <!-- Image with right-side hot zone -->
        <span style="width:100%; text-align:center; max-width:100vw; display:block;">
            <h1 style="color:white; font-size:2.5vw; line-height:0px; font-family:sans-serif;">
                System Assessment Results
            </h1>

            <div style="position:relative; display:inline-block;">
    <img src="../images/cia2-ai-infrastructure-sar.png" alt="module-03" style="height:75vh; display:block;">

    <!-- Existing hot zone: right 50% of image, middle 50% vertically → SAR XML -->
    <a href="https://raw.githubusercontent.com/usnistgov/OSCALER/refs/heads/main/src/cia2infrastructure_snippet_sar.xml"
       target="_blank"
       style="position:absolute; top:20%; left:50%; width:50%; height:70%;
              display:block; cursor:pointer; background-color:rgba(255,255,255,0);"
       title="View SAR XML source">
    </a>

    <!-- New hot zone: left 50% of image, middle 50% vertically → Module-15 -->
    <a href="./Module-15.html"
       target="_blank"
       style="position:absolute; top:25%; left:0%; width:50%; height:50%;
              display:block; cursor:pointer; background-color:rgba(255,255,255,0);"
       title="Go to Module 15">
    </a>
</div>
        </span>

        <!-- Centered input field -->
        <form onsubmit="LogIn(); return false;" style="width:100%;">
            <div class="input-row">
                <label for="risk-mitigation">Risk mitigation needed for the following control objective ID:</label>
                <input type="text" id="risk-mitigation" placeholder="Enter your answer..." autocomplete="off">
                <button type="submit" class="submit-btn">Submit</button>
            </div>
        </form>

        <br/>
        <div style="width:100%; height:4vh; background:rgb(248, 249, 250); font-size:3vh; color:rgb(7, 7, 244); text-align:center;">
            <a href="javascript:window.open('','_self').close();">CLOSE THIS TAB AND RETURN TO THE LOBBY</a>
        </div>

    </body>
</html>
