    <body id="body">
        <script type="text/javascript">
               window.onload = setInterval(clock,1000);
               function clock()
               {
                   var d = new Date();
                   var date = d.getDate();
                   var year = d.getFullYear();
                   var month = d.getMonth();
                   var day = d.getDay();
                   var monthArr = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November","December"];
                   month = monthArr[month];
                   var weekArr = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                   weekDay = weekArr[day];
                   var mins = d.getMinutes().toString().padStart(2,'0');
                   var secs = d.getSeconds().toString().padStart(2,'0');
                   document.getElementById("date").innerHTML=weekDay+", "+date+" "+month+", "+(year+10)+"; "+d.getHours()+":"+mins+":"+secs+" EST";  
               } 

               function setMyVolume() {
                  var myvolume = document.getElementById("alarm");
                  console.log('current volume before adjusting it');
                  myvolume = 0.8;
                }
               
               setInterval(function() {
                    var div = document.querySelector("#counter");
                    if (div !== null) 
                    {
                      var count = div.textContent * 1 - 1;
                      div.textContent = count;                 
                      if (count <= 0) {
                            window.location.replace("./Escape-Room-Lobby.html");
                        }
                    }                  
                }, 1000);

                setTimeout(function() { 
                  document.getElementById("msgdelay").play(); 
                  console.log('your audio is started just now');
                }, 10000)
       </script>
