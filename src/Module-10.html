<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <title>OSCAL Virtual Escape Room Module #10</title>
        <meta charset="UTF-8"></meta>
        <meta name="viewport" content="width=device-width, initial-scale=1, height=device-height"></meta>
        <link rel="stylesheet" href="../css/OSCALER-room.css">

        <script async type="text/javascript" id="_fed_an_ua_tag"
            src="https://dap.digitalgov.gov/Universal-Federated-Analytics-Min.js?agency=NIST&subagency=github&pua=UA-66610693-1&yt=true&exts=ppsx,pps,f90,sch,rtf,wrl,txz,m1v,xlsm,msi,xsd,f,tif,eps,mpg,xml,pl,xlt,c">
        </script>

        <script>
            function LogIn() {
                var psw_value = document.getElementById('psw').value.trim();
                console.log(`Ghost component count entered: ${psw_value}`);

                if (psw_value === "222") {
                    window.location.href = "./Module-10.01.html";
                    return;
                } else {
                    alert("Incorrect. Please try again.");
                }
            }
        </script>
    </head>
    <body id="body" style="vertical-align: baseline;">

        <script>
            setInterval(function() {
                var div = document.querySelector("#counter");
                if (div !== null) {
                    var count = div.textContent * 1 - 1;
                    div.textContent = count;
                    if (count <= 0) {
                        window.location.replace("./CountDown.html");
                    }
                }
            }, 1000);
        </script>

        <span style="width:100%; text-align:center; max-width:100vw;">
            <h1 style="color:white; font-size:2.5vw; line-height:0px; font-family:sans-serif;">
                Infrastructure's DNA Has Been Hacked!
            </h1>
            <div style="position:relative; display:inline-block;">
                <img src="../images/dna-cdef.png" alt="module-10" style="height:70vh; display:block;">
                <a href="https://github.com/usnistgov/OSCALER/blob/main/src/component-definitions/README.md"
                   target="_blank"
                   style="position:absolute; top:30%; left:45%; width:34%; height:40%; display:block; cursor:pointer; background-color:rgba(255,255,255,0);"
                   title="View component definitions on GitHub">
                </a>
            </div>
        </span>

        <span style="display:block; width:100%; text-align:center; max-width:100vw; margin-top:1vh;">
            <form style="font-size:1.5vw; color:rgb(255, 119, 0);" onsubmit="LogIn(); return false;">
                <label for="psw">Enter here the number of ghost components you identified, then click the 'Submit' button. </label>
                <input type="text" id="psw" name="psw" required
                       style="font-size:1.0vw"
                       onkeydown="if(event.key==='Enter'){ LogIn(); return false; }">
                <input type="button" value=" Submit " onClick="LogIn()" style="font-size:1.0vw">
                <br/><br/><br/>
            </form>
        </span>
        
        <div style="width:100%; height:4vh; background:rgb(248, 249, 250); font-size:3vh; color:rgb(182, 32, 6); text-align:center;">
            <a href="javascript:window.open('','_self').close();">CLOSE THIS TAB AND RETURN TO THE LOBBY</a>
        </div>
        <br/><br/>
    </body>
</html>
