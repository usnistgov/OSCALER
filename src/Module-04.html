<!<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <title>OSCAL Virtual Escape Room Module #13</title>
        <meta charset="UTF-8"></meta>
        <meta name="viewport" content="width=device-width, initial-scale=1, height=device-height"></meta>
        <link rel="stylesheet" href="../css/OSCALER-room.css">
        <script async type="text/javascript" id="_fed_an_ua_tag"
            src="https://dap.digitalgov.gov/Universal-Federated-Analytics-Min.js?agency=NIST&subagency=github&pua=UA-66610693-1&yt=true&exts=ppsx,pps,f90,sch,rtf,wrl,txz,m1v,xlsm,msi,xsd,f,tif,eps,mpg,xml,pl,xlt,c">
        </script>
  
        <script>
            function LogIn() {
                var v1 = document.getElementById('f1').value.trim().toLowerCase();
                var v2 = document.getElementById('f2').value.trim().toLowerCase();
                var v3 = document.getElementById('f3').value.trim().toLowerCase();

                var ok1 = v1 === "related-observation"  || v1 === "related-observations";
                var ok2 = v2 === "related-finding"      || v2 === "related-findings";
                var ok3 = v3 === "associated-risk"      || v3 === "associated-risks";

                if (ok1 && ok2 && ok3) {
                    window.location.href = "./Module-07.html";
                } else {
                    var msg = "One or more answers are incorrect. Check:\n";
                    if (!ok1) msg += "  • Link to observation: not quite\n";
                    if (!ok2) msg += "  • Link to finding: not quite\n";
                    if (!ok3) msg += "  • Link to risk: not quite\n";
                    alert(msg);
                }
            }
        </script>

        <style>
            /* Wrapper centers the form contents on the page */
            .form-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 20px;
                margin: 1.5vh auto 0 auto;
            }

            .answer-table {
                border-collapse: separate;
                border-spacing: 10px;
                font-family: sans-serif;
            }
            .answer-table th {
                color: rgb(249, 248, 247);
                font-size: 1.4vw;
                text-align: left;
                padding-right: 12px;
                white-space: nowrap;
            }
            .answer-table td {
                padding: 4px;
            }
            .answer-table input[type="text"] {
                font-size: 1.1vw;
                padding: 4px 8px;
                border: 2px solid rgb(167, 243, 117);
                border-radius: 4px;
                background: black;
                color: rgb(167, 243, 117);
                width: 14vw;
            }

            /* Button sits to the right of the table, vertically centered */
            .submit-btn {
                font-size: 1.2vw;
                padding: 10px 28px;
                background: rgb(167, 243, 117);
                color: rgb(0, 0, 0);
                border: 4px solid rgb(100, 147, 71);
                border-radius: 4px;
                cursor: pointer;
                white-space: nowrap;
                align-self: center;
            }
            .submit-btn:hover {
                background: rgb(100, 147, 71);
                border: 4px solid rgb(167, 243, 117);
                color: black;
            }
        </style>
    </head>
    <body id="body" style="vertical-align: baseline;">

        <script>
            setInterval(function() {
                var div = document.querySelector("#counter");
                if (div !== null) {
                    var count = div.textContent * 1 - 1;
                    div.textContent = count;
                    if (count <= 0) {
                        window.location.replace("./CountDown.html");
                    }
                }
            }, 1000);
        </script>

        <!-- Image with hot zone overlay -->
        <span style="width:100%; text-align:center; max-width:100vw; display:block;">
            <h1 style="color:white; font-size:2.5vw; line-height:0px; font-family:sans-serif;">
                Plan of Actions and Milestones (POA&M)
            </h1>

            <div style="position:relative; display:inline-block;">
                <img src="../images/poam-diagram-snippet.png" alt="module-04" style="height:70vh; display:block;">

                <!-- Hot zone: left 50% of image width, middle 50% of image height -->
                <a href="https://raw.githubusercontent.com/usnistgov/OSCALER/refs/heads/main/src/cia2infrastructure_snippet_poam.xml"
                   target="_blank"
                   style="position:absolute; top:20%; left:0%; width:50%; height:70%;
                          display:block; cursor:pointer; background-color:rgba(255,255,255,0);"
                   title="View POA&M XML snippet source">
                </a>
                <!-- Hot zone: right 50% of image width, middle 50% of image height -->
                <a href="https://pages.nist.gov/OSCAL-Reference/models/v1.2.1/plan-of-action-and-milestones/xml-reference/#/plan-of-action-and-milestones/poam-item"
                   target="_blank"
                   style="position:absolute; top:60%; left:50%; width:50%; height:40%;
                          display:block; cursor:pointer; background-color:rgba(255,255,255,0);"
                   title="View POA&M XML reference">
                </a>
            </div>
        </span>

        <!-- Table + button side by side, centered -->
    <form onsubmit="LogIn(); return false;" style="width:100%;">
      <div class="form-wrapper" style="display:flex; justify-content:center; align-items:center; gap:20px; width:100%;">
        <table class="answer-table">
            <tr>
                <!-- th>Leveraging assemblies:</th -->
                <td><input type="text" id="f1" placeholder="name of observation link ..." autocomplete="off"></td>
                <td><input type="text" id="f2" placeholder="name of finding link ..." autocomplete="off"></td>
                <td><input type="text" id="f3" placeholder="name of risk link ..." autocomplete="off"></td>
            </tr>
        </table>

        <button type="submit" class="submit-btn">Submit</button>
      </div>
    </form>

        <br/>
        <div style="width:100%; height:4vh; background:rgb(248, 249, 250); font-size:3vh; color:rgb(182, 32, 6); text-align:center;">
            <a href="javascript:window.open('','_self').close();">CLOSE THIS PAGE AND RETURN TO THE LOBBY</a>
        </div>

    </body>
</html>
