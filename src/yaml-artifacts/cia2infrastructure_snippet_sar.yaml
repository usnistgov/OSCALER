        title: Configure Cross-Account IAM Role Trust for CIA2 and Assessor CIA2Cloud Accounts
        description: The CIA2 system engineer will coordinate with the assessor's engineering support staff to configure an IAM role trust. A service account for automation with its own role with the assessor's CIA2Cloud account can assume the role for read-only assessor operations within the CIA2 Product Team's CIA2Cloud account for continuous monitoring of least privilege.
        remarks: |-
          This step is complete.

          CIA2 Product Team and SCA Engineering Support configured the latter's cross-account role trust and authentication and authorization in to the former's account on January 29, 2026.
      - uuid: 976aadad-b1ce-475b-aa6c-e082537e7902
        title: Automate Cross-Account Login to CIA2 CIA2Cloud Account
        description: The assessor's security automation platform will create a session from their dedicated will obtain access to the CIA2 Product Team's CIA2Cloud account with their single sign-on credentials to a read-only assessor role.
        remarks: |-
          This step is complete.

          CIA2 Product Team and SCA Engineering Support tested scripts from the security automation platform interactively on January 30, 2026, to confirm they work ahead of Feb 2026 continuous monitoring cycle.
      - uuid: 18ce4e19-7432-4484-8e75-2dd8f05668cf
        title: Analyze CIA2 Developer and System Engineer Roles for Least Privilege
        description: |-
          Once authenticated and authorized with a cross-account session, the security automation pipeline will execute scripts developed and maintained by the assessor's engineering support staff. It will analyze the permitted actions for the developer and system engineer roles in the CIA2 Product Team's CIA2Cloud account to confirm they are designed and implement to facilitate only least privilege operation. Examples are included below.

          - For the CIA2 developer role in their CIA2Cloud account, the developer role may only permit the user with this role to check the IP addresses and status of the CIA2 Compute Service server instances. This role will not permit the user to create, change, or delete the instances. Similarly, the developer will permit a user to perform actions to see IP addresses of an CIA2 Load Balancer instance, but not add, change, or delete the instances.
          - For the CIA2 system engineer role in their CIA2Cloud account, the system engineer role may only permit actions where the user can add, change, or delete instances for approved services (i.e. CIA2 Compute Service, CIA2 Load Balancer, et cetera). The role may not permit actions by the user for any other service.
