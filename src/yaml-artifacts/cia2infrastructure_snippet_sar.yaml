      title: CIA2Cloud IAM Roles Test - CIA2 System Engineer Role
      description: Test CIA2Cloud IAM Roles for least privilege design and implementation.
      methods:
      - TEST
      types:
      - finding
      subjects:
      - subject-uuid: 551b9706-d6a4-4d25-8207-f2ccec548b89
        type: component
      collected: 2026-02-01T08:31:20-04:00
      expires: 2027-03-01T00:00:00-04:00
      remarks: |-
        The assessor's security automation platform analyzed all roles specific to the CIA2 Product Team, not those managed by the Office of Information Technology. The `CIA2-SystemEngineer` role in their respective CIA2Cloud account permitted use of the following high-risk actions.

        - CIA2Cloud:auditlog:DeleteAccountAuditLog
        - CIA2Cloud:secmon:AdministerConfigurations

        Both of these actions are overly permissive and not appropriate for the business function of the staff member assigned this role.
    - uuid: 4a2fb32e-9be9-43cf-b717-e9e47de061bd
      title: CIA2Cloud IAM Roles Test - CIA2 Developer Role
      description: Test CIA2Cloud IAM Roles for least privilege design and implementation.
      methods:
      - TEST
      types:
      - finding
      subjects:
      - subject-uuid: 551b9706-d6a4-4d25-8207-f2ccec548b89
        type: component
      collected: 2026-02-01T08:31:20-04:00
      expires: 2027-03-01T00:00:00-04:00
      remarks: The assessor's security automation platform detected that the developer's role is permitted to perform only permissible actions in the CIA2 CIA2Cloud account in accordance with the agency's least privilege policy and procedures.
    risks:
    - uuid: 0cfa750e-3553-47ba-a7ba-cf84a884d261
      title: CIA2 System Engineers Have Over-Privileged Access to Cloud Infrastructure Account
      description: A user in the CIA2 cloud environment with the privileges of a system engineer can exceed the intended privileges for their related business function. They can delete all historical audit records and remove important security monitoring functions for the CIA2 Security Operations Center staff.
      statement: |-
        An account without proper least privilege design and implementation can be used to surreptitiously add, change, or delete cloud infrastructure to the too managing all links to CIA2's communication to public citizens, potentially causing significant harm with no forensic evidence to recover the system. Regardless of the extent and duration of a potential incident, such a configuration greatly increases the risk of an insider threat if there were likely to a potential insider threat in the CIA2 Product Team.

        If such an insider threat existed and acted with this misconfiguration, the resulting event could cause significant financial and reputational risk to CIA2's Administrator, executive staff, and the agency overall.
      status: investigating
    findings:
    - uuid: 45d8a6c2-1368-4bad-9ba0-7141f0a32889
      title: CIA2 CIA2Cloud Account's System Engineer Role Permits High Risk Actions
      description: |-
        The assessor's security automation platform detected that the system engineer's role is permitted to perform the following actions in the CIA2 CIA2Cloud account.

        - Delete and reset account audit logs.
        - Add, change, or delete security monitoring configurations in the CIA2 Security Monitor service used by the CIA2 Security Operations Center.

        The system engineer is not permitted to modify these services and their role was incorrectly configured.
      target:
        type: objective-id
        target-id: ac-6.1_obj
        description: This is a finding.
        status:
          state: not-satisfied
