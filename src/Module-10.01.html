        <link rel="stylesheet" href="../css/OSCALER-room.css">

    <body id="body" style="vertical-align: baseline;">

        <script>
            setInterval(function() {
                var div = document.querySelector("#counter");
                if (div !== null) {
                    var count = div.textContent * 1 - 1;
                    div.textContent = count;
                    if (count <= 0) {
                        window.location.replace("./CountDown.html");
                    }
                }
            }, 1000);
        </script>

        <span style="width:100%; text-align:center; max-width:100vw;">
            <h1 style="color:white; font-size:2.5vw; line-height:0px; font-family:sans-serif;">
                Inheritance Integrity Check: FAILED!
            </h1>

            <div style="position:relative; display:inline-block;">
                <img src="../images/inheritance.png" alt="module-10" style="height:80vh; display:block;">

                <!-- Existing: top 40%, center third — links to GitHub -->
                <a href="https://github.com/usnistgov/OSCALER/tree/main/src/component-definitions"
                   target="_blank"
                   style="position:absolute; top:0%; left:33%; width:34%; height:40%;
                          display:block; cursor:pointer; background-color:rgba(255,255,255,0);"
                   title="View component definitions on GitHub">
                </a>

                <!-- New: middle 25% height, right side — focuses Lobby tab -->
                <a href="javascript:void(0);"
                   onclick="window.opener && window.opener.focus();"
                   style="position:absolute; top:25%; left:75%; width:25%; height:25%;
                          display:block; cursor:pointer; background-color:rgba(255,255,255,0);"
                   title="Return focus to the Lobby">
                </a>
            </div>
        </span>

        <br/><br/><br/>
        <div style="width:100%; height:4vh; background:rgb(248, 249, 250); font-size:3vh; color:rgb(182, 32, 6); text-align:center;">
            <a href="javascript:window.open('','_self').close();">REMEMBER THE INSTRUCTIONS BEFORE YOU CLOSE THIS TAB AND RETURN TO THE LOBBY TO RESOLVE THIS ISSUE</a>
        </div>

    </body>
